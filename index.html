<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Game Ideas Reviewer</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a16;--bg2:#12122a;--bg3:#1a1a3e;--bg4:#252560;
  --text:#e0e0f0;--text2:#9898c0;--text3:#6060a0;
  --accent:#6c5ce7;--accent2:#a855f7;--accent3:#5b5bd6;
  --pink:#e84393;--pink2:#f472b6;
  --green:#00cec9;--yellow:#fdcb6e;--red:#ff7675;--cyan:#00f0ff;
  --card-radius:14px;--transition:0.25s ease;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
html{font-size:15px;-webkit-tap-highlight-color:transparent}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;
  overflow-x:hidden;padding-bottom:calc(64px + var(--safe-bottom));
}
a{color:inherit;text-decoration:none}
button{font:inherit;border:none;background:none;color:inherit;cursor:pointer;-webkit-tap-highlight-color:transparent}
input,textarea{font:inherit;border:none;background:none;color:inherit;outline:none}

/* ===== Scrollbar ===== */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}

/* ===== Header ===== */
.header{
  position:sticky;top:0;z-index:100;
  background:rgba(13,13,20,0.92);backdrop-filter:blur(12px);
  padding:12px 16px;display:flex;align-items:center;gap:12px;
  border-bottom:1px solid rgba(124,92,252,0.15);
}
.header-title{font-size:1.15rem;font-weight:700;
  background:linear-gradient(135deg,var(--accent),var(--pink));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  white-space:nowrap;
}
.header-back{
  width:36px;height:36px;border-radius:10px;background:var(--bg3);
  display:flex;align-items:center;justify-content:center;font-size:1.2rem;
  flex-shrink:0;transition:var(--transition);
}
.header-back:active{transform:scale(0.9)}
.header-right{margin-left:auto;display:flex;gap:8px}

/* ===== Search ===== */
.search-wrap{
  margin:12px 16px;position:relative;
}
.search-wrap input{
  width:100%;padding:12px 16px 12px 42px;
  background:var(--bg2);border:1px solid var(--bg4);border-radius:12px;
  font-size:0.95rem;color:var(--text);transition:var(--transition);
}
.search-wrap input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,92,252,0.15)}
.search-wrap .search-icon{
  position:absolute;left:14px;top:50%;transform:translateY(-50%);
  color:var(--text3);font-size:1rem;pointer-events:none;
}

/* ===== Filter Bar ===== */
.filter-bar{
  padding:0 16px;display:flex;gap:8px;overflow-x:auto;
  scrollbar-width:none;-ms-overflow-style:none;
  margin-bottom:8px;
}
.filter-bar::-webkit-scrollbar{display:none}
.filter-chip{
  flex-shrink:0;padding:7px 14px;border-radius:20px;font-size:0.8rem;font-weight:600;
  background:var(--bg3);color:var(--text2);transition:var(--transition);
  border:1px solid transparent;white-space:nowrap;
}
.filter-chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.filter-chip:active{transform:scale(0.95)}
.filter-chip .badge{
  display:inline-flex;align-items:center;justify-content:center;
  min-width:18px;height:18px;padding:0 5px;border-radius:9px;
  font-size:0.65rem;font-weight:800;background:var(--pink);color:#fff;margin-left:5px;
}
.filter-chip.active .badge{background:rgba(255,255,255,0.3)}

/* ===== Sort / Control Bar ===== */
.control-bar{
  padding:8px 16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;
}
.control-bar .count{font-size:0.8rem;color:var(--text3);margin-right:auto}
.ctrl-btn{
  padding:6px 12px;border-radius:8px;font-size:0.75rem;font-weight:600;
  background:var(--bg3);color:var(--text2);transition:var(--transition);
}
.ctrl-btn.active{background:var(--accent3);color:#fff}
.ctrl-btn:active{transform:scale(0.95)}
.and-or-toggle{
  padding:4px;border-radius:8px;background:var(--bg3);display:flex;
}
.and-or-toggle button{
  padding:5px 10px;border-radius:6px;font-size:0.7rem;font-weight:700;
  transition:var(--transition);color:var(--text3);
}
.and-or-toggle button.active{background:var(--accent);color:#fff}

/* ===== Tag Badges ===== */
.tag-colors{--t0:#7c5cfc;--t1:#ec4899;--t2:#f59e0b;--t3:#10b981;--t4:#06b6d4;--t5:#8b5cf6;--t6:#ef4444;--t7:#3b82f6;--t8:#14b8a6;--t9:#f97316}
.tag-badge{
  display:inline-flex;align-items:center;padding:3px 10px;border-radius:10px;
  font-size:0.7rem;font-weight:600;white-space:nowrap;transition:var(--transition);
  cursor:pointer;border:1px solid transparent;
}
.tag-badge:active{transform:scale(0.93)}
.tag-badge.selected{border-color:#fff;box-shadow:0 0 8px rgba(255,255,255,0.2)}

/* ===== Cards ===== */
.card-list{padding:8px 16px;display:flex;flex-direction:column;gap:12px}
.card{
  background:var(--bg2);border-radius:var(--card-radius);padding:16px;
  border:1px solid var(--bg4);transition:var(--transition);
  position:relative;overflow:hidden;
  animation:cardIn 0.3s ease both;
}
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--accent),var(--pink));opacity:0;
  transition:var(--transition);
}
.card:active{transform:scale(0.985)}
.card:active::before{opacity:1}
.card.read{opacity:0.65}
.card.read::before{display:none}
.card.archived{display:none}
.card .unread-dot{
  position:absolute;top:16px;left:10px;width:8px;height:8px;
  border-radius:50%;background:var(--accent);
}
@keyframes cardIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.card-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
.card-title{font-size:1.05rem;font-weight:700;flex:1;line-height:1.3}
.card-type{
  flex-shrink:0;padding:3px 8px;border-radius:6px;font-size:0.65rem;font-weight:700;
  text-transform:uppercase;letter-spacing:0.5px;
}
.card-type.proposal{background:rgba(124,92,252,0.2);color:var(--accent)}
.card-type.seed{background:rgba(251,191,36,0.2);color:var(--yellow)}
.card-scores{
  flex-shrink:0;display:flex;gap:4px;
}
.card-score{
  width:28px;height:28px;border-radius:7px;
  display:flex;align-items:center;justify-content:center;
  font-size:0.75rem;font-weight:800;
}
.card-score.commercial{background:rgba(253,203,110,0.2);color:var(--yellow)}
.card-score.streaming{background:rgba(0,240,255,0.2);color:var(--cyan)}
.card-logline{font-size:0.82rem;color:var(--text2);line-height:1.5;margin-bottom:10px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.card-footer{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.card-heart{
  position:absolute;top:14px;right:14px;width:36px;height:36px;
  display:flex;align-items:center;justify-content:center;
  border-radius:50%;background:rgba(0,0,0,0.3);font-size:1.1rem;
  transition:var(--transition);z-index:2;
}
.card-heart.liked{color:var(--pink);animation:heartPop 0.35s ease}
.card-heart:active{transform:scale(0.85)}
@keyframes heartPop{0%{transform:scale(1)}50%{transform:scale(1.35)}100%{transform:scale(1)}}
.card-memo-indicator{
  position:absolute;bottom:14px;right:14px;font-size:0.7rem;
  color:var(--yellow);display:flex;align-items:center;gap:3px;
}

/* ===== Detail Page ===== */
.detail-page{
  display:none;padding:0 0 32px;
}
.detail-page.visible{display:block}
.detail-hero{
  padding:20px 16px;
  background:linear-gradient(180deg,var(--bg3) 0%,var(--bg) 100%);
}
.detail-hero .title{font-size:1.4rem;font-weight:800;margin-bottom:6px}
.detail-hero .meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.detail-hero .tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px}
.highlight-box{
  background:var(--bg2);border-radius:12px;padding:14px;margin-bottom:10px;
  border-left:3px solid var(--accent);
}
.highlight-box.hook{border-left-color:var(--pink)}
.highlight-box .label{font-size:0.7rem;font-weight:700;text-transform:uppercase;
  letter-spacing:1px;color:var(--accent);margin-bottom:4px}
.highlight-box.hook .label{color:var(--pink)}
.highlight-box p{font-size:0.88rem;line-height:1.6;color:var(--text)}
.detail-actions{
  display:flex;gap:10px;padding:12px 16px;
}
.detail-action-btn{
  flex:1;padding:12px;border-radius:12px;font-size:0.85rem;font-weight:700;
  text-align:center;transition:var(--transition);
}
.detail-action-btn.like-btn{background:var(--bg3);color:var(--text2)}
.detail-action-btn.like-btn.liked{background:rgba(236,72,153,0.15);color:var(--pink)}
.detail-action-btn.archive-btn{background:var(--bg3);color:var(--text2)}
.detail-action-btn.archive-btn.archived{background:rgba(52,211,153,0.15);color:var(--green)}
.detail-action-btn.pass-btn{background:rgba(248,113,113,0.15);color:var(--red)}
.detail-action-btn.pass-btn.passed{background:rgba(248,113,113,0.25);color:var(--red)}
.detail-action-btn.pono-btn{background:rgba(124,92,252,0.15);color:var(--accent)}
.detail-action-btn.pono-btn:active{transform:scale(0.96)}
.detail-action-btn:active{transform:scale(0.96)}

/* ===== Memo ===== */
.memo-section{
  margin:0 16px 16px;padding:14px;background:var(--bg2);border-radius:12px;
  border:1px solid var(--bg4);
}
.memo-section .memo-label{font-size:0.8rem;font-weight:700;color:var(--yellow);margin-bottom:8px;display:flex;align-items:center;gap:5px}
.memo-section textarea{
  width:100%;min-height:80px;padding:10px;background:var(--bg);
  border:1px solid var(--bg4);border-radius:8px;resize:vertical;
  font-size:0.85rem;line-height:1.5;color:var(--text);
  transition:var(--transition);
}
.memo-section textarea:focus{border-color:var(--accent)}
.memo-section .memo-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:8px}
.memo-save-btn{
  padding:8px 18px;border-radius:8px;font-size:0.8rem;font-weight:700;
  background:var(--accent);color:#fff;transition:var(--transition);
}
.memo-save-btn:active{transform:scale(0.95)}

/* ===== Review/Feedback ===== */
.review-section{background:var(--bg3);border-radius:var(--card-radius);padding:14px;margin:12px 16px}
.review-label{font-size:0.8rem;font-weight:700;color:var(--cyan);margin-bottom:10px;display:flex;align-items:center;gap:5px}
.star-rating{display:flex;gap:4px;margin-bottom:10px}
.star-rating .star{font-size:1.8rem;cursor:pointer;color:var(--bg4);transition:color 0.15s}
.star-rating .star.active{color:var(--yellow)}
.star-rating .star:hover{color:var(--yellow);opacity:0.7}
.status-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.status-pill{padding:5px 12px;border-radius:20px;font-size:0.75rem;font-weight:600;border:1px solid var(--bg4);color:var(--text2);cursor:pointer;transition:var(--transition)}
.status-pill.active[data-status="go"]{background:rgba(52,211,153,0.2);border-color:var(--green);color:var(--green)}
.status-pill.active[data-status="rework"]{background:rgba(251,191,36,0.2);border-color:var(--yellow);color:var(--yellow)}
.status-pill.active[data-status="pass"]{background:rgba(248,113,113,0.2);border-color:var(--red);color:var(--red)}
.status-pill.active[data-status="maybe"]{background:rgba(124,92,252,0.2);border-color:var(--accent);color:var(--accent)}
.review-comment{width:100%;min-height:60px;background:var(--bg2);border:1px solid var(--bg4);border-radius:10px;padding:10px;resize:vertical;font-size:0.85rem;margin-bottom:8px}
.review-comment:focus{border-color:var(--cyan)}
.review-save-btn{background:linear-gradient(135deg,var(--cyan),#0ea5e9);color:#000;font-weight:700;padding:8px 20px;border-radius:10px;font-size:0.85rem;width:100%}
.review-save-btn:active{transform:scale(0.95)}
.review-saved{font-size:0.75rem;color:var(--green);margin-top:6px;text-align:center}

/* ===== Markdown Content ===== */
.md-content{
  padding:16px;line-height:1.7;font-size:0.9rem;
}
.md-content h1{font-size:1.4rem;font-weight:800;margin:20px 0 10px;
  background:linear-gradient(135deg,var(--accent),var(--pink));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.md-content h2{font-size:1.15rem;font-weight:700;margin:18px 0 8px;color:var(--accent);
  padding-bottom:4px;border-bottom:1px solid var(--bg4)}
.md-content h3{font-size:1rem;font-weight:700;margin:14px 0 6px;color:var(--text)}
.md-content p{margin:8px 0;color:var(--text2)}
.md-content ul,.md-content ol{margin:8px 0 8px 20px;color:var(--text2)}
.md-content li{margin:4px 0}
.md-content strong{color:var(--text);font-weight:700}
.md-content table{width:100%;border-collapse:collapse;margin:12px 0;font-size:0.82rem}
.md-content th{background:var(--bg3);padding:8px 10px;text-align:left;font-weight:700;
  border:1px solid var(--bg4)}
.md-content td{padding:8px 10px;border:1px solid var(--bg4);color:var(--text2)}
.md-content tr:nth-child(even) td{background:rgba(30,30,50,0.4)}

/* ===== Dashboard ===== */
.dashboard{display:none;padding:16px}
.dashboard.visible{display:block}
.dash-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.dash-card{
  background:var(--bg2);border-radius:12px;padding:16px 12px;text-align:center;
  border:1px solid var(--bg4);
}
.dash-card .num{font-size:1.6rem;font-weight:800;
  background:linear-gradient(135deg,var(--accent),var(--pink));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.dash-card .lbl{font-size:0.7rem;color:var(--text3);margin-top:2px}
.dash-section{margin-bottom:20px}
.dash-section h3{font-size:0.9rem;font-weight:700;color:var(--text2);margin-bottom:10px}
.dash-tag-row{
  display:flex;align-items:center;gap:8px;padding:8px 0;
  border-bottom:1px solid var(--bg4);
}
.dash-tag-row .tag-name{flex:1;font-size:0.85rem}
.dash-tag-row .tag-count{font-size:0.85rem;font-weight:700;color:var(--accent)}
.dash-tag-bar{flex:2;height:6px;background:var(--bg4);border-radius:3px;overflow:hidden}
.dash-tag-bar-fill{height:100%;border-radius:3px;transition:width 0.5s ease}
.export-btn{
  width:100%;padding:14px;border-radius:12px;font-size:0.9rem;font-weight:700;
  background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;
  transition:var(--transition);margin-top:8px;
}
.export-btn:active{transform:scale(0.97)}

/* ===== Bottom Nav ===== */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:rgba(13,13,20,0.95);backdrop-filter:blur(12px);
  border-top:1px solid rgba(124,92,252,0.15);
  display:flex;padding:6px 0 calc(6px + var(--safe-bottom));
}
.nav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:8px 4px;font-size:0.65rem;color:var(--text3);transition:var(--transition);
}
.nav-item .nav-icon{font-size:1.3rem;transition:var(--transition)}
.nav-item.active{color:var(--accent)}
.nav-item.active .nav-icon{transform:scale(1.1)}
.nav-item:active{transform:scale(0.9)}

/* ===== Empty State ===== */
.empty-state{
  text-align:center;padding:48px 24px;color:var(--text3);
}
.empty-state .icon{font-size:3rem;margin-bottom:12px;opacity:0.5}
.empty-state p{font-size:0.9rem}

/* ===== Toast ===== */
.toast{
  position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--bg3);color:var(--text);padding:10px 20px;border-radius:10px;
  font-size:0.82rem;font-weight:600;opacity:0;transition:all 0.3s ease;
  pointer-events:none;z-index:200;border:1px solid var(--bg4);
  white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ===== Ideas Page ===== */
.ideas-page{display:none;padding:12px 16px 32px}
.ideas-page.visible{display:block}
.idea-input-wrap{
  display:flex;gap:8px;margin-bottom:16px;
}
.idea-input-wrap textarea{
  flex:1;padding:12px;background:var(--bg2);border:1px solid var(--bg4);
  border-radius:12px;font-size:0.9rem;color:var(--text);resize:none;
  min-height:48px;max-height:120px;transition:var(--transition);
}
.idea-input-wrap textarea:focus{border-color:var(--accent)}
.idea-add-btn{
  flex-shrink:0;width:48px;height:48px;border-radius:12px;
  background:linear-gradient(135deg,var(--accent),var(--pink));color:#fff;
  font-size:1.4rem;display:flex;align-items:center;justify-content:center;
  transition:var(--transition);align-self:flex-end;
}
.idea-add-btn:active{transform:scale(0.9)}
.idea-list{display:flex;flex-direction:column;gap:10px}
.idea-card{
  background:var(--bg2);border-radius:12px;padding:14px;
  border:1px solid var(--bg4);position:relative;
  animation:cardIn 0.3s ease both;
}
.idea-card.done{opacity:0.5}
.idea-card .idea-text{font-size:0.9rem;line-height:1.6;color:var(--text);white-space:pre-wrap;word-break:break-word}
.idea-card .idea-meta{display:flex;align-items:center;gap:8px;margin-top:8px;font-size:0.7rem;color:var(--text3)}
.idea-card .idea-actions{display:flex;gap:6px;margin-left:auto}
.idea-action{
  width:30px;height:30px;border-radius:8px;background:var(--bg3);
  display:flex;align-items:center;justify-content:center;font-size:0.85rem;
  transition:var(--transition);
}
.idea-action:active{transform:scale(0.9)}
.idea-empty{text-align:center;padding:48px 24px;color:var(--text3)}
.idea-empty .icon{font-size:3rem;margin-bottom:12px;opacity:0.5}

/* ===== Install Banner ===== */
.install-banner{
  position:fixed;bottom:70px;left:16px;right:16px;z-index:150;
  background:linear-gradient(135deg,var(--accent),var(--accent3));
  border-radius:14px;padding:14px 16px;
  display:flex;align-items:center;gap:12px;
  box-shadow:0 8px 32px rgba(124,92,252,0.3);
  animation:slideUp 0.4s ease;
}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
.install-banner .install-text{flex:1;font-size:0.85rem;font-weight:600;color:#fff;line-height:1.3}
.install-banner .install-btn{
  padding:8px 18px;border-radius:10px;font-size:0.8rem;font-weight:700;
  background:#fff;color:var(--accent);white-space:nowrap;
}
.install-banner .install-close{
  width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,0.2);
  display:flex;align-items:center;justify-content:center;font-size:0.9rem;color:#fff;flex-shrink:0;
}

/* ===== Sync Status ===== */
.sync-bar{
  display:flex;align-items:center;gap:6px;padding:4px 16px;
  font-size:0.7rem;color:var(--text3);
}
.sync-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sync-dot.ok{background:var(--green)}
.sync-dot.error{background:var(--red)}
.sync-dot.syncing{background:var(--yellow);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.sync-setup{
  margin:16px;padding:16px;background:var(--bg2);border-radius:12px;
  border:1px solid var(--bg4);
}
.sync-setup h4{font-size:0.9rem;font-weight:700;margin-bottom:10px;color:var(--accent)}
.sync-setup p{font-size:0.8rem;color:var(--text2);line-height:1.5;margin-bottom:10px}
.sync-setup input{
  width:100%;padding:10px;background:var(--bg);border:1px solid var(--bg4);
  border-radius:8px;font-size:0.85rem;color:var(--text);margin-bottom:10px;
}
.sync-setup input:focus{border-color:var(--accent)}
.sync-setup .sync-save{
  width:100%;padding:10px;border-radius:10px;font-size:0.85rem;font-weight:700;
  background:linear-gradient(135deg,var(--green),#059669);color:#fff;
}
.sync-setup .sync-save:active{transform:scale(0.97)}
.sync-setup .sync-disconnect{
  width:100%;padding:10px;border-radius:10px;font-size:0.85rem;font-weight:700;
  background:var(--bg3);color:var(--red);margin-top:8px;
}

/* ===== Backup Modal ===== */
.modal-overlay{
  position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.7);
  display:flex;align-items:center;justify-content:center;padding:24px;
  animation:fadeIn 0.2s ease;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{
  background:var(--bg2);border-radius:16px;padding:24px;width:100%;max-width:400px;
  border:1px solid var(--bg4);
}
.modal h3{font-size:1.1rem;font-weight:700;margin-bottom:16px;
  background:linear-gradient(135deg,var(--accent),var(--pink));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.modal-btn{
  width:100%;padding:14px;border-radius:12px;font-size:0.9rem;font-weight:700;
  margin-bottom:10px;transition:var(--transition);text-align:center;
}
.modal-btn:active{transform:scale(0.97)}
.modal-btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff}
.modal-btn.secondary{background:var(--bg3);color:var(--text2)}
.modal-btn.danger{background:rgba(248,113,113,0.15);color:var(--red)}
.modal .file-input-wrap{position:relative;overflow:hidden}
.modal .file-input-wrap input[type="file"]{
  position:absolute;inset:0;opacity:0;cursor:pointer;font-size:0;
}

/* ===== PONO Page ===== */
.pono-page{display:none;padding:0 0 32px}
.pono-page.visible{display:block}
.pono-project-list{padding:12px 16px;display:flex;flex-direction:column;gap:10px}
.pono-project-card{
  background:var(--bg2);border-radius:var(--card-radius);padding:16px;
  border:1px solid var(--bg4);transition:var(--transition);
  position:relative;overflow:hidden;animation:cardIn 0.3s ease both;cursor:pointer;
}
.pono-project-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--accent),var(--pink));opacity:0;transition:var(--transition);
}
.pono-project-card:active{transform:scale(0.985)}
.pono-project-card:active::before{opacity:1}
.pono-project-card .ppc-title{font-size:1rem;font-weight:700;margin-bottom:6px}
.pono-project-card .ppc-meta{display:flex;align-items:center;gap:10px;font-size:0.75rem;color:var(--text3)}
.pono-project-card .ppc-memo-count{color:var(--accent);font-weight:600}
.pono-memo-header{
  display:flex;align-items:center;gap:10px;padding:12px 16px;
  background:var(--bg2);border-bottom:1px solid var(--bg4);
}
.pono-memo-back{
  width:32px;height:32px;border-radius:8px;background:var(--bg3);
  display:flex;align-items:center;justify-content:center;font-size:1rem;
  flex-shrink:0;transition:var(--transition);
}
.pono-memo-back:active{transform:scale(0.9)}
.pono-memo-title{flex:1;font-size:0.95rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pono-tag-filter{
  display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;
  padding:10px 16px;background:var(--bg2);border-bottom:1px solid var(--bg4);
}
.pono-tag-filter::-webkit-scrollbar{display:none}
.pono-tag-chip{
  flex-shrink:0;padding:6px 12px;border-radius:16px;font-size:0.75rem;font-weight:600;
  background:var(--bg3);color:var(--text2);transition:var(--transition);
  border:1px solid transparent;white-space:nowrap;cursor:pointer;
}
.pono-tag-chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.pono-tag-chip:active{transform:scale(0.95)}
.pono-memo-list{padding:12px 16px;display:flex;flex-direction:column;gap:10px;min-height:200px}
.pono-memo-card{
  background:var(--bg2);border-radius:12px;padding:12px 14px;
  border:1px solid var(--bg4);transition:var(--transition);animation:cardIn 0.25s ease both;
}
.pono-memo-text{font-size:0.88rem;line-height:1.6;color:var(--text);white-space:pre-wrap;word-break:break-word}
.pono-memo-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
.pono-memo-tag{
  display:inline-flex;align-items:center;padding:2px 8px;border-radius:8px;
  font-size:0.68rem;font-weight:600;white-space:nowrap;
}
.pono-memo-tag.tag-idea{background:rgba(124,92,252,0.15);color:#7c5cfc}
.pono-memo-tag.tag-scene{background:rgba(236,72,153,0.15);color:#ec4899}
.pono-memo-tag.tag-character{background:rgba(245,158,11,0.15);color:#f59e0b}
.pono-memo-tag.tag-world{background:rgba(16,185,129,0.15);color:#10b981}
.pono-memo-tag.tag-script{background:rgba(59,130,246,0.15);color:#3b82f6}
.pono-memo-tag.tag-asset{background:rgba(107,114,128,0.15);color:#6b7280}
.pono-memo-bottom{display:flex;align-items:center;gap:8px;margin-top:8px;font-size:0.68rem;color:var(--text3)}
.pono-memo-actions{display:flex;gap:5px;margin-left:auto}
.pono-memo-action-btn{
  width:28px;height:28px;border-radius:7px;background:var(--bg3);
  display:flex;align-items:center;justify-content:center;font-size:0.78rem;
  transition:var(--transition);
}
.pono-memo-action-btn:active{transform:scale(0.88)}
.pono-fab{
  position:fixed;right:20px;bottom:80px;width:52px;height:52px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--pink));color:#fff;
  font-size:1.6rem;display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 20px rgba(124,92,252,0.4);z-index:90;
  transition:var(--transition);
}
.pono-fab.hidden{display:none}
.pono-fab:active{transform:scale(0.92)}
.memo-edit-modal .modal{max-height:90vh;overflow-y:auto}
.memo-tag-select{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.memo-tag-btn{
  padding:5px 10px;border-radius:8px;font-size:0.72rem;font-weight:600;
  background:var(--bg3);color:var(--text2);border:1px solid transparent;
  transition:var(--transition);cursor:pointer;
}
.memo-tag-btn.active.tag-idea{background:rgba(124,92,252,0.2);color:#7c5cfc;border-color:#7c5cfc}
.memo-tag-btn.active.tag-scene{background:rgba(236,72,153,0.2);color:#ec4899;border-color:#ec4899}
.memo-tag-btn.active.tag-character{background:rgba(245,158,11,0.2);color:#f59e0b;border-color:#f59e0b}
.memo-tag-btn.active.tag-world{background:rgba(16,185,129,0.2);color:#10b981;border-color:#10b981}
.memo-tag-btn.active.tag-script{background:rgba(59,130,246,0.2);color:#3b82f6;border-color:#3b82f6}
.memo-tag-btn.active.tag-asset{background:rgba(107,114,128,0.2);color:#6b7280;border-color:#6b7280}
.memo-edit-textarea{
  width:100%;min-height:120px;max-height:300px;padding:12px;
  background:var(--bg);border:1px solid var(--bg4);border-radius:10px;
  font-size:0.9rem;line-height:1.6;color:var(--text);resize:vertical;
  margin-bottom:12px;transition:var(--transition);
}
.memo-edit-textarea:focus{border-color:var(--accent)}

/* ===== Update Badge ===== */
.update-badge{
  position:absolute;top:12px;left:24px;
  background:linear-gradient(135deg,#ff6b6b,#ee5a24);color:#fff;
  font-size:0.6rem;font-weight:800;padding:2px 6px;border-radius:4px;
  letter-spacing:0.5px;z-index:2;
}

/* ===== Update Diff ===== */
.update-diff{background:rgba(255,107,107,0.1);border:1px solid rgba(255,107,107,0.2);border-radius:10px;padding:12px;margin-top:12px}
.diff-label{font-size:0.8rem;font-weight:700;color:#ff6b6b;margin-bottom:8px}
.diff-item{margin-bottom:8px}
.diff-field{font-size:0.75rem;font-weight:600;color:var(--text2);display:block;margin-bottom:4px}
.diff-old{font-size:0.82rem;color:#ff6b6b;text-decoration:line-through;opacity:0.7;margin-bottom:4px;line-height:1.5}
.diff-new{font-size:0.82rem;color:#44dd88;line-height:1.5}
.diff-toggle-btn{margin-top:6px;padding:6px 14px;border-radius:8px;font-size:0.78rem;font-weight:600;background:var(--bg3);color:#ff6b6b;border:1px solid rgba(255,107,107,0.3);cursor:pointer}
.diff-toggle-btn:active{transform:scale(0.95)}

/* ===== Utilities ===== */
.hidden{display:none!important}

<script src="data.js"></script>
<script>
(function(){
"use strict";

// ===== Constants =====
const TAG_COLORS = ['#7c5cfc','#ec4899','#f59e0b','#10b981','#06b6d4','#8b5cf6','#ef4444','#3b82f6','#14b8a6','#f97316'];
const PONO_TAGS = {
  idea: '\u{1F4A1} アイデア',
  scene: '\u{1F3AC} シーン',
  character: '\u{1F464} キャラ',
  world: '\u{1F30F} 世界観',
  script: '\u{1F4DD} 脚本',
  asset: '\u{1F4C1} 素材'
};

// ===== State =====
let state = {
  view: 'list',        // list | detail | dashboard | ideas | pono
  search: '',
  typeFilter: 'inbox', // inbox | all | proposal | seed | liked | memo | archived | passed
  selectedTags: [],
  tagMode: 'or',       // or | and
  sort: 'rating',      // rating | name
  currentId: null,
  likes: {},           // id -> true
  memos: {},           // id -> string
  reviews: {},         // id -> {rating, status, comment, timestamp}
  readItems: {},       // id -> true
  archivedItems: {},   // id -> true
  passedItems: {},     // id -> true
  ideas: [],           // [{id, text, createdAt, done}]
  seenHashes: {},
  prevVersions: {},
  pono: {
    sentIds: [],
    activeId: null,
    notes: {} // { [gameIdeaId]: [{id, text, tags:[], createdAt, updatedAt}] }
  }
};

// ===== Storage =====
function loadStorage(){
  try{
    const keys = ['likes','memos','reviews','readItems','archivedItems','passedItems','ideas'];
    const storageKeys = ['gi_likes','gi_memos','gi_reviews','gi_read','gi_archived','gi_passed','gi_ideas'];
    keys.forEach((k,i) => {
      const v = localStorage.getItem(storageKeys[i]);
      if(v) state[k] = JSON.parse(v);
    });
    const pono = localStorage.getItem('gi_pono');
    if(pono) state.pono = Object.assign(state.pono, JSON.parse(pono));
    const sh = localStorage.getItem('gi_seen_hashes');
    if(sh) state.seenHashes = JSON.parse(sh);
    const pv = localStorage.getItem('gi_prev_versions');
    if(pv) state.prevVersions = JSON.parse(pv);
  }catch(e){}
}
function saveLikes(){ localStorage.setItem('gi_likes', JSON.stringify(state.likes)); }
function saveMemos(){ localStorage.setItem('gi_memos', JSON.stringify(state.memos)); }
function saveReviews(){ localStorage.setItem('gi_reviews', JSON.stringify(state.reviews)); }
function saveRead(){ localStorage.setItem('gi_read', JSON.stringify(state.readItems)); }
function saveArchived(){ localStorage.setItem('gi_archived', JSON.stringify(state.archivedItems)); }
function savePassedItems(){ localStorage.setItem('gi_passed', JSON.stringify(state.passedItems)); }
function saveIdeas(){ localStorage.setItem('gi_ideas', JSON.stringify(state.ideas)); }
function savePono(){ localStorage.setItem('gi_pono', JSON.stringify(state.pono)); }
function saveSeenHashes(){ localStorage.setItem('gi_seen_hashes', JSON.stringify(state.seenHashes)); }
function savePrevVersions(){ localStorage.setItem('gi_prev_versions', JSON.stringify(state.prevVersions)); }

// ===== Tag color map =====
const tagColorMap = {};
let colorIdx = 0;
function getTagColor(tag){
  if(!tagColorMap[tag]){ tagColorMap[tag] = TAG_COLORS[colorIdx % TAG_COLORS.length]; colorIdx++; }
  return tagColorMap[tag];
}

// ===== Score helpers =====
function avgScore(p){ return ((p.commercial||0) + (p.streaming||0)) / 2; }

// ===== All tags =====
function getAllTags(){
  const s = new Set();
  GAME_IDEAS_DATA.forEach(p => p.tags.forEach(t => s.add(t)));
  return [...s];
}

// ===== Update Detection =====
function hashGameIdea(p){
  const str = (p.summary||'') + (p.hook||'') + (p.content||'') + (p.tags||[]).join(',');
  let h = 0;
  for(let i = 0; i < str.length; i++){ h = ((h << 5) - h + str.charCodeAt(i)) | 0; }
  return h.toString(36);
}

function checkForUpdates(){
  let updatedCount = 0;
  GAME_IDEAS_DATA.forEach(p => {
    const newHash = hashGameIdea(p);
    const oldHash = state.seenHashes[p.id];
    if(oldHash && oldHash !== newHash){
      const prev = state.prevVersions[p.id] || {};
      state.prevVersions[p.id] = {
        summary: prev.summary_current || p.summary,
        hook: prev.hook_current || p.hook,
        content: prev.content_current || p.content,
        savedAt: new Date().toISOString(),
        summary_current: p.summary,
        hook_current: p.hook,
        content_current: p.content
      };
      delete state.readItems[p.id];
      updatedCount++;
    } else {
      if(!state.prevVersions[p.id]) state.prevVersions[p.id] = {};
      state.prevVersions[p.id].summary_current = p.summary;
      state.prevVersions[p.id].hook_current = p.hook;
      state.prevVersions[p.id].content_current = p.content;
    }
    state.seenHashes[p.id] = newHash;
  });
  saveSeenHashes();
  savePrevVersions();
  if(updatedCount > 0){
    saveRead();
    showToast(updatedCount + '件のアイデアが更新されました');
  }
}

function getFiltered(){
  let list = GAME_IDEAS_DATA.slice();
  // type filter
  if(state.typeFilter === 'inbox') list = list.filter(p => !state.archivedItems[p.id] && !state.passedItems[p.id]);
  else if(state.typeFilter === 'archived') list = list.filter(p => state.archivedItems[p.id]);
  else if(state.typeFilter === 'passed') list = list.filter(p => state.passedItems[p.id]);
  else if(state.typeFilter === 'proposal') list = list.filter(p => p.type === 'proposal' && !state.archivedItems[p.id] && !state.passedItems[p.id]);
  else if(state.typeFilter === 'seed') list = list.filter(p => p.type === 'seed' && !state.archivedItems[p.id] && !state.passedItems[p.id]);
  else if(state.typeFilter === 'liked') list = list.filter(p => state.likes[p.id]);
  else if(state.typeFilter === 'memo') list = list.filter(p => state.memos[p.id] && state.memos[p.id].trim());
  // search
  if(state.search){
    const q = state.search.toLowerCase();
    list = list.filter(p =>
      p.title.toLowerCase().includes(q) ||
      p.summary.toLowerCase().includes(q) ||
      p.tags.some(t => t.toLowerCase().includes(q))
    );
  }
  // tag filter
  if(state.selectedTags.length > 0){
    if(state.tagMode === 'and'){
      list = list.filter(p => state.selectedTags.every(t => p.tags.includes(t)));
    } else {
      list = list.filter(p => state.selectedTags.some(t => p.tags.includes(t)));
    }
  }
  // sort
  if(state.sort === 'rating'){
    list.sort((a,b) => avgScore(b) - avgScore(a));
  } else {
    list.sort((a,b) => a.title.localeCompare(b.title,'ja'));
  }
  return list;
}

// ===== Simple Markdown Parser =====
function parseMD(md){
  if(!md) return '';
  // table
  const lines = md.split('\n');
  let html = '';
  let inTable = false;
  let tableHeader = false;
  let inUl = false;
  let inOl = false;

  for(let i = 0; i < lines.length; i++){
    let line = lines[i];

    // table row
    if(line.trim().startsWith('|') && line.trim().endsWith('|')){
      const cells = line.split('|').filter((_,idx,arr) => idx > 0 && idx < arr.length -1).map(c => c.trim());
      // check if separator row
      if(cells.every(c => /^[-:]+$/.test(c))){
        tableHeader = false;
        continue;
      }
      if(!inTable){
        if(inUl){html+='</ul>';inUl=false}
        if(inOl){html+='</ol>';inOl=false}
        html += '<table>';
        inTable = true;
        tableHeader = true;
      }
      const tag = tableHeader ? 'th' : 'td';
      html += '<tr>' + cells.map(c => '<'+tag+'>' + inlineFormat(c) + '</'+tag+'>').join('') + '</tr>';
      if(tableHeader) tableHeader = false;
      continue;
    } else if(inTable){
      html += '</table>';
      inTable = false;
    }

    // headings
    const h3 = line.match(/^### (.+)/);
    if(h3){if(inUl){html+='</ul>';inUl=false}if(inOl){html+='</ol>';inOl=false} html+='<h3>'+inlineFormat(h3[1])+'</h3>';continue}
    const h2 = line.match(/^## (.+)/);
    if(h2){if(inUl){html+='</ul>';inUl=false}if(inOl){html+='</ol>';inOl=false} html+='<h2>'+inlineFormat(h2[1])+'</h2>';continue}
    const h1 = line.match(/^# (.+)/);
    if(h1){if(inUl){html+='</ul>';inUl=false}if(inOl){html+='</ol>';inOl=false} html+='<h1>'+inlineFormat(h1[1])+'</h1>';continue}

    // unordered list
    const ul = line.match(/^[-*] (.+)/);
    if(ul){
      if(inOl){html+='</ol>';inOl=false}
      if(!inUl){html+='<ul>';inUl=true}
      html+='<li>'+inlineFormat(ul[1])+'</li>';continue;
    } else if(inUl){html+='</ul>';inUl=false}

    // ordered list
    const ol = line.match(/^\d+\. (.+)/);
    if(ol){
      if(inUl){html+='</ul>';inUl=false}
      if(!inOl){html+='<ol>';inOl=true}
      html+='<li>'+inlineFormat(ol[1])+'</li>';continue;
    } else if(inOl){html+='</ol>';inOl=false}

    // empty line
    if(line.trim() === ''){continue}

    // paragraph
    html += '<p>' + inlineFormat(line) + '</p>';
  }
  if(inUl) html += '</ul>';
  if(inOl) html += '</ol>';
  if(inTable) html += '</table>';
  return html;
}

function inlineFormat(s){
  s = s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/__(.+?)__/g, '<strong>$1</strong>');
  return s;
}

      if (r.status === 'go' && !state.pono.sentIds.includes(id)) {

      }
    }
    if (count > 0) { savePono(); showToast(count + '件をGO→仮組みに追加'); }
  }
  autoSendGoToPono();

  renderTagFilter();
  renderCards();
  updateInboxBadge();

  // Type filter chips
  document.getElementById('typeFilter').addEventListener('click', e => {
    const chip = e.target.closest('.filter-chip');
    if(!chip) return;
    document.querySelectorAll('#typeFilter .filter-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    state.typeFilter = chip.dataset.type;
    renderCards();
  });

  // Tag filter
  document.getElementById('tagFilter').addEventListener('click', e => {
    const badge = e.target.closest('.tag-badge');
    if(!badge) return;
    const tag = badge.dataset.tag;
    const idx = state.selectedTags.indexOf(tag);
    if(idx >= 0) state.selectedTags.splice(idx,1);
    else state.selectedTags.push(tag);
    renderTagFilter();
    renderCards();
  });

  // AND/OR toggle
  document.getElementById('andOrToggle').addEventListener('click', e => {
    const btn = e.target.closest('button');
    if(!btn) return;
    state.tagMode = btn.dataset.mode;
    document.querySelectorAll('#andOrToggle button').forEach(b => b.classList.toggle('active', b.dataset.mode === state.tagMode));
    renderCards();
  });

  // Sort
  document.getElementById('sortBtn').addEventListener('click', e => {
    state.sort = state.sort === 'rating' ? 'name' : 'rating';
    e.target.textContent = state.sort === 'rating' ? 'スコア順' : '名前順';
    e.target.classList.toggle('active', state.sort === 'name');
    renderCards();
  });

  // Search
  let searchDebounce;
  document.getElementById('searchInput').addEventListener('input', e => {
    clearTimeout(searchDebounce);
    searchDebounce = setTimeout(()=>{
      state.search = e.target.value.trim();
      renderCards();
    }, 200);
  });

  // Card click (open detail)
  document.getElementById('cardList').addEventListener('click', e => {
    // heart button
    const heart = e.target.closest('[data-heart]');
    if(heart){
      e.stopPropagation();
      const id = heart.dataset.heart;
      if(state.likes[id]){delete state.likes[id]} else {state.likes[id]=true}
      saveLikes();
      renderCards();
      return;
    }
    const card = e.target.closest('.card');
    if(!card) return;
    const id = card.dataset.id;
    history.pushState({view:'detail',id:id}, '');
    renderDetail(id);
    showView('detail');
  });

  // Back button
  document.getElementById('backBtn').addEventListener('click', () => showView('list'));

  // Detail actions
  document.getElementById('detailActions').addEventListener('click', e => {
    const likeBtn = e.target.closest('.like-btn');
    if(likeBtn){
      const id = state.currentId;
      if(state.likes[id]){delete state.likes[id]} else {state.likes[id]=true}
      saveLikes();
      renderDetail(id);
      showToast(state.likes[id] ? 'ライクしました' : 'ライクを解除しました');
      return;
    }
    const archiveBtn = e.target.closest('.archive-btn');
    if(archiveBtn){
      const id = state.currentId;
      if(state.archivedItems[id]){delete state.archivedItems[id]} else {state.archivedItems[id]=true}
      saveArchived();
      renderDetail(id);
      showToast(state.archivedItems[id] ? 'アーカイブしました' : 'アーカイブを解除しました');
      return;
    }
    const passBtn = e.target.closest('.pass-btn');
    if(passBtn){
      const id = state.currentId;
      if(state.passedItems[id]){delete state.passedItems[id]} else {state.passedItems[id]=true}
      savePassedItems();
      renderDetail(id);
      showToast(state.passedItems[id] ? '見送りにしました' : '見送りを解除しました');
      return;
    }
    const ponoBtn = e.target.closest('.pono-btn');
    if(ponoBtn){
      const id = state.currentId;
      if(!state.pono.sentIds.includes(id)){
        state.pono.sentIds.push(id);
        if(!state.pono.notes[id]) state.pono.notes[id] = [];
        savePono();
      }
      showToast('仮組みに追加しました');
    }
  });

  // Memo save
  document.getElementById('memoSaveBtn').addEventListener('click', () => {
    const val = document.getElementById('memoText').value.trim();
    if(val) state.memos[state.currentId] = val;
    else delete state.memos[state.currentId];
    saveMemos();
    showToast('メモを保存しました');
  });

  // Bottom nav
  document.getElementById('bottomNav').addEventListener('click', e => {
    const item = e.target.closest('.nav-item');
    if(!item) return;
    const view = item.dataset.view;
    if(view !== 'list') history.pushState({view:view}, '');
    showView(view);
  });

  // ===== Review System =====
  document.getElementById('starRating').addEventListener('click', (e) => {
    const star = e.target.closest('.star');
    if(!star) return;
    const val = parseInt(star.dataset.val);
    const id = state.currentId;
    if(!state.reviews[id]) state.reviews[id] = {};
    state.reviews[id].rating = val;
    updateStarDisplay(val);
  });

  document.getElementById('statusPills').addEventListener('click', (e) => {
    const pill = e.target.closest('.status-pill');
    if(!pill) return;
    const status = pill.dataset.status;
    const id = state.currentId;
    if(!state.reviews[id]) state.reviews[id] = {};
    state.reviews[id].status = status;
    document.querySelectorAll('.status-pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
  });

  document.getElementById('reviewSaveBtn').addEventListener('click', () => {
    const id = state.currentId;
    if(!id) return;
    if(!state.reviews[id]) state.reviews[id] = {};
    state.reviews[id].comment = document.getElementById('reviewComment').value;
    state.reviews[id].timestamp = new Date().toISOString();
    saveReviews();
    document.getElementById('reviewSaved').textContent = '保存しました (' + new Date().toLocaleTimeString() + ')';
    showToast('レビュー保存しました');
  });

  function updateStarDisplay(val){
    document.querySelectorAll('#starRating .star').forEach(s => {
      s.classList.toggle('active', parseInt(s.dataset.val) <= val);
    });
  }

  function loadReviewForCurrent(){
    const id = state.currentId;
    const r = state.reviews[id];
    document.getElementById('reviewComment').value = r ? (r.comment||'') : '';
    updateStarDisplay(r ? (r.rating||0) : 0);
    document.querySelectorAll('.status-pill').forEach(p => {
      p.classList.toggle('active', r && r.status === p.dataset.status);
    });
    document.getElementById('reviewSaved').textContent = r && r.timestamp ? '最終保存: '+new Date(r.timestamp).toLocaleString() : '';
  }

  // Hook into detail view opening — load review data after rendering detail
  const origRenderDetail = renderDetail;
  renderDetail = function(id){
    origRenderDetail(id);
    loadReviewForCurrent();
  };

  // ===== Ideas events =====
  document.getElementById('ideaAddBtn').addEventListener('click', () => {
    const input = document.getElementById('ideaInput');
    const text = input.value.trim();
    if(!text) return;
    state.ideas.unshift({id: Date.now().toString(), text, createdAt: new Date().toISOString(), done:false});
    saveIdeas();
    input.value = '';
    renderIdeas();
    showToast('アイデアを追加しました');
  });

  document.getElementById('ideaInput').addEventListener('keydown', (e) => {
    if(e.key === 'Enter' && !e.shiftKey){
      e.preventDefault();
      document.getElementById('ideaAddBtn').click();
    }
  });

  document.getElementById('ideaList').addEventListener('click', (e) => {
    const doneBtn = e.target.closest('[data-idea-done]');
    if(doneBtn){
      const idx = parseInt(doneBtn.dataset.ideaDone);
      state.ideas[idx].done = !state.ideas[idx].done;
      saveIdeas();
      renderIdeas();
      return;
    }
    const delBtn = e.target.closest('[data-idea-del]');
    if(delBtn){
      const idx = parseInt(delBtn.dataset.ideaDel);
      state.ideas.splice(idx, 1);
      saveIdeas();
      renderIdeas();
      showToast('削除しました');
    }
  });

  // Feedback export (Claude Code用)
  document.getElementById('exportFeedbackBtn').addEventListener('click', () => {
    const feedback = {
      exportDate: new Date().toISOString(),
      summary: { total: GAME_IDEAS_DATA.length, reviewed: Object.keys(state.reviews).length, liked: Object.keys(state.likes).filter(k=>state.likes[k]).length },
      reviews: []
    };
    for(const [id, r] of Object.entries(state.reviews)){
      const p = GAME_IDEAS_DATA.find(x => x.id === id);
      if(!p || !r) continue;
      feedback.reviews.push({
        id, title: p.title, type: p.type, rating: r.rating||0, status: r.status||'', comment: r.comment||'',
        commercial: p.commercial||0, streaming: p.streaming||0, tags: p.tags, summary: p.summary, memo: state.memos[id]||'',
        liked: !!state.likes[id], timestamp: r.timestamp||''
      });
    }
    feedback.reviews.sort((a,b) => (b.rating||0) - (a.rating||0));
    const json = JSON.stringify(feedback, null, 2);
    const blob = new Blob([json], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'feedback.json'; a.click();
    URL.revokeObjectURL(url);
    showToast('フィードバックをエクスポートしました');
  });

  // Export (liked)
  document.getElementById('exportBtn').addEventListener('click', () => {
    const likedIds = Object.keys(state.likes).filter(k => state.likes[k]);
    const likedData = GAME_IDEAS_DATA.filter(p => likedIds.includes(p.id));
    const json = JSON.stringify(likedData, null, 2);
    const blob = new Blob([json], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'liked_game_ideas.json';
    a.click();
    URL.revokeObjectURL(url);
    showToast('エクスポートしました');
  });

  // ===== PONO events =====
  // FAB - add memo
  document.getElementById('ponoFab').addEventListener('click', () => {
    if(!state.pono.activeId) return;
    openMemoModal('add', null);
  });

  // PONO view delegated events
  document.getElementById('ponoView').addEventListener('click', e => {
    const projectCard = e.target.closest('[data-pono-project]');
    if(projectCard){
      state.pono.activeId = projectCard.dataset.ponoProject;
      ponoTagFilter = 'all';
      savePono();
      renderPonoView();
      return;
    }
    const backBtn = e.target.closest('#ponoBackBtn');
    if(backBtn){
      state.pono.activeId = null;
      ponoTagFilter = 'all';
      savePono();
      renderPonoView();
      return;
    }
    const tagChip = e.target.closest('[data-ptag]');
    if(tagChip){
      ponoTagFilter = tagChip.dataset.ptag;
      renderPonoView();
      return;
    }
    const editBtn = e.target.closest('[data-memo-edit]');
    if(editBtn){
      openMemoModal('edit', parseInt(editBtn.dataset.memoEdit));
      return;
    }
    const delBtn = e.target.closest('[data-memo-del]');
    if(delBtn){
      const idx = parseInt(delBtn.dataset.memoDel);
      const activeId = state.pono.activeId;
      if(!activeId) return;
      const notes = state.pono.notes[activeId] || [];
      notes.splice(idx,1);
      savePono(); renderPonoView(); showToast('削除しました');
      return;
    }
  });

  // Memo modal tag selector
  document.getElementById('memoTagSelect').addEventListener('click', e => {
    const btn = e.target.closest('.memo-tag-btn');
    if(!btn) return;
    const tag = btn.dataset.tag;
    const idx = memoEditTags.indexOf(tag);
    if(idx>=0){ memoEditTags.splice(idx,1); btn.classList.remove('active'); }
    else{ memoEditTags.push(tag); btn.classList.add('active'); }
  });

  // Memo modal save
  document.getElementById('memoEditSaveBtn').addEventListener('click', () => {
    const text = document.getElementById('memoEditText').value.trim();
    if(!text){ showToast('内容を入力してください'); return; }
    const activeId = state.pono.activeId;
    if(!activeId){ showToast('アイデアが選択されていません'); return; }
    if(!state.pono.notes[activeId]) state.pono.notes[activeId] = [];
    const notes = state.pono.notes[activeId];
    if(memoEditMode==='add'){
      notes.push({ id: Date.now().toString(), text, tags: memoEditTags.slice(), createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() });
      showToast('メモを追加しました');
    } else if(memoEditMode==='edit' && memoEditIdx!==null){
      notes[memoEditIdx].text = text;
      notes[memoEditIdx].tags = memoEditTags.slice();
      notes[memoEditIdx].updatedAt = new Date().toISOString();
      showToast('メモを更新しました');
    }
    savePono(); closeMemoModal(); renderPonoView();
  });

  document.getElementById('memoEditCancelBtn').addEventListener('click', closeMemoModal);
  document.getElementById('memoEditModal').addEventListener('click', e => {
    if(e.target.classList.contains('memo-edit-modal')) closeMemoModal();
  });

  // ===== Swipe navigation in detail view =====
  let swipeStartX=0, swipeStartY=0;
  const detailEl = document.getElementById('detailView');
  detailEl.addEventListener('touchstart', e=>{
    swipeStartX=e.touches[0].clientX;
    swipeStartY=e.touches[0].clientY;
  },{passive:true});
  detailEl.addEventListener('touchend', e=>{
    const dx=e.changedTouches[0].clientX-swipeStartX;
    const dy=e.changedTouches[0].clientY-swipeStartY;
    if(Math.abs(dx)<80||Math.abs(dy)>Math.abs(dx)*0.7) return;
    const list=getFiltered();
    const idx=list.findIndex(p=>p.id===state.currentId);
    if(idx<0) return;
    let nextIdx = dx<0 ? idx+1 : idx-1;
    if(nextIdx<0) nextIdx=list.length-1;
    if(nextIdx>=list.length) nextIdx=0;
    renderDetail(list[nextIdx].id);
    showToast((nextIdx+1)+'/'+list.length);
    window.scrollTo(0,0);
  },{passive:true});

  // Popstate
  window.addEventListener('popstate', () => {
    if(state.view==='detail'||state.view==='dashboard') showView('list');
  });

  // ===== Backup / Restore =====
  document.getElementById('openBackupBtn').addEventListener('click', ()=>document.getElementById('backupModal').classList.remove('hidden'));
  document.getElementById('backupCloseBtn').addEventListener('click', ()=>document.getElementById('backupModal').classList.add('hidden'));
  document.getElementById('backupModal').addEventListener('click', e=>{if(e.target.id==='backupModal')e.target.classList.add('hidden')});
  document.getElementById('backupExportBtn').addEventListener('click', () => {
    const backup = { version:5, exportDate:new Date().toISOString(), likes:state.likes, memos:state.memos, reviews:state.reviews, readItems:state.readItems, archivedItems:state.archivedItems, passedItems:state.passedItems, ideas:state.ideas, pono:state.pono, seenHashes:state.seenHashes, prevVersions:state.prevVersions };
    const blob = new Blob([JSON.stringify(backup,null,2)],{type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download='game-ideas-backup-'+new Date().toISOString().slice(0,10)+'.json'; a.click();
    URL.revokeObjectURL(url); showToast('バックアップを書き出しました');
  });
  document.getElementById('backupImportFile').addEventListener('change', e => {
    const file=e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = function(ev){
      try{
        const data = JSON.parse(ev.target.result);
        if(!data.version){ showToast('無効なバックアップファイルです'); return; }
        state.likes=data.likes||{}; state.memos=data.memos||{}; state.reviews=data.reviews||{};
        state.readItems=data.readItems||{}; state.archivedItems=data.archivedItems||{};
        state.passedItems=data.passedItems||{};
        state.ideas=data.ideas||[];
        if(data.pono) state.pono=Object.assign(state.pono,data.pono);
        if(data.seenHashes) state.seenHashes=data.seenHashes;
        if(data.prevVersions) state.prevVersions=data.prevVersions;
        saveLikes();saveMemos();saveReviews();saveRead();saveArchived();savePassedItems();saveIdeas();savePono();saveSeenHashes();savePrevVersions();
        renderCards();
        document.getElementById('backupModal').classList.add('hidden');
        showToast('バックアップを復元しました！');
      }catch(err){ showToast('ファイルの読み込みに失敗しました'); }
    };
    reader.readAsText(file); e.target.value='';
  });

  // ===== GitHub Sync =====
  const SYNC_REPO = 'studiogosso/game-ideas-app';
  const SYNC_FILE = 'user-data.json';
  let syncToken = localStorage.getItem('gi_sync_token')||'';
  let syncSha = localStorage.getItem('gi_sync_sha')||'';
  let syncTimer = null;

  function getSyncData(){
    return { version:5, syncedAt:new Date().toISOString(), likes:state.likes, memos:state.memos, reviews:state.reviews, readItems:state.readItems, archivedItems:state.archivedItems, passedItems:state.passedItems, ideas:state.ideas, pono:state.pono, seenHashes:state.seenHashes, prevVersions:state.prevVersions };
  }
  function updateSyncUI(status,label){
    document.getElementById('syncDot').className='sync-dot '+status;
    document.getElementById('syncLabel').textContent=label;
  }
  function initSyncUI(){
    const input=document.getElementById('syncTokenInput');
    const disconn=document.getElementById('syncDisconnectBtn');
    if(syncToken){ input.value='••••••••••'; disconn.classList.remove('hidden'); updateSyncUI('ok','接続済み'); }
    else{ disconn.classList.add('hidden'); updateSyncUI('','未設定'); }
  }
  async function syncToGitHub(){
    if(!syncToken) return;
    updateSyncUI('syncing','同期中...');
    try{
      const content=btoa(unescape(encodeURIComponent(JSON.stringify(getSyncData(),null,2))));
      const body={message:'sync: '+new Date().toISOString(),content};
      if(syncSha) body.sha=syncSha;
      const res=await fetch('https://api.github.com/repos/'+SYNC_REPO+'/contents/'+SYNC_FILE,{method:'PUT',headers:{'Authorization':'Bearer '+syncToken,'Content-Type':'application/json'},body:JSON.stringify(body)});
      if(!res.ok){ const err=await res.json(); if(res.status===409){await fetchSyncSha();return syncToGitHub();} throw new Error(err.message||res.status); }
      const result=await res.json(); syncSha=result.content.sha; localStorage.setItem('gi_sync_sha',syncSha);
      updateSyncUI('ok','同期済み '+new Date().toLocaleTimeString());
    }catch(e){ console.error('Sync error:',e); updateSyncUI('error','同期エラー: '+e.message); }
  }
  async function fetchSyncSha(){
    try{
      const res=await fetch('https://api.github.com/repos/'+SYNC_REPO+'/contents/'+SYNC_FILE,{headers:{'Authorization':'Bearer '+syncToken}});
      if(res.ok){ const data=await res.json(); syncSha=data.sha; localStorage.setItem('gi_sync_sha',syncSha); }
      else{ syncSha=''; localStorage.removeItem('gi_sync_sha'); }
    }catch(e){ syncSha=''; }
  }
  function scheduleSyncDebounced(){ if(!syncToken) return; clearTimeout(syncTimer); syncTimer=setTimeout(syncToGitHub,3000); }
  const origSaveLikes=saveLikes; saveLikes=function(){origSaveLikes();scheduleSyncDebounced()};
  const origSaveMemos=saveMemos; saveMemos=function(){origSaveMemos();scheduleSyncDebounced()};
  const origSaveReviews=saveReviews; saveReviews=function(){origSaveReviews();scheduleSyncDebounced()};
  const origSaveRead=saveRead; saveRead=function(){origSaveRead();scheduleSyncDebounced()};
  const origSaveArchived=saveArchived; saveArchived=function(){origSaveArchived();scheduleSyncDebounced()};
  const origSavePassedItems=savePassedItems; savePassedItems=function(){origSavePassedItems();scheduleSyncDebounced()};
  const origSaveIdeas=saveIdeas; saveIdeas=function(){origSaveIdeas();scheduleSyncDebounced()};
  const origSavePono=savePono; savePono=function(){origSavePono();scheduleSyncDebounced()};
  const origSaveSeenHashes=saveSeenHashes; saveSeenHashes=function(){origSaveSeenHashes();scheduleSyncDebounced()};
  const origSavePrevVersions=savePrevVersions; savePrevVersions=function(){origSavePrevVersions();scheduleSyncDebounced()};

  document.getElementById('syncSaveBtn').addEventListener('click', async()=>{
    const input=document.getElementById('syncTokenInput'); const token=input.value.trim();
    if(!token||token==='••••••••••') return;
    syncToken=token; localStorage.setItem('gi_sync_token',syncToken);
    await fetchSyncSha(); await syncToGitHub(); initSyncUI(); showToast('GitHub同期を設定しました');
  });
  document.getElementById('syncDisconnectBtn').addEventListener('click',()=>{
    syncToken=''; syncSha=''; localStorage.removeItem('gi_sync_token'); localStorage.removeItem('gi_sync_sha');
    initSyncUI(); showToast('同期を解除しました');
  });
  initSyncUI();

  // ===== PWA Install =====
  let deferredPrompt=null;
  window.addEventListener('beforeinstallprompt',e=>{
    e.preventDefault(); deferredPrompt=e;
    if(!localStorage.getItem('gi_install_dismissed')) document.getElementById('installBanner').classList.remove('hidden');
  });
  document.getElementById('installBtn').addEventListener('click',async()=>{
    if(!deferredPrompt) return;
    deferredPrompt.prompt(); const result=await deferredPrompt.userChoice;
    if(result.outcome==='accepted') showToast('アプリをインストールしました！');
    deferredPrompt=null; document.getElementById('installBanner').classList.add('hidden');
  });
  document.getElementById('installClose').addEventListener('click',()=>{
    document.getElementById('installBanner').classList.add('hidden');
    localStorage.setItem('gi_install_dismissed','1');
  });
  window.addEventListener('appinstalled',()=>{ document.getElementById('installBanner').classList.add('hidden'); deferredPrompt=null; });
}

document.addEventListener('DOMContentLoaded', init);
})();
</script>
<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').catch(e=>console.log('SW failed:',e));
}
</script>
</body>
</html>
