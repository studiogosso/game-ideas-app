<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a16"/>
      <stop offset="100%" stop-color="#12122a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="100%" stop-color="#6c5ce7"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <g transform="translate(256,240)" fill="none" stroke="url(#glow)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round">
    <!-- Gamepad body -->
    <path d="M-120,0 C-120,-50 -80,-80 -40,-80 L40,-80 C80,-80 120,-50 120,0 C120,40 100,80 60,80 L40,60 L-40,60 L-60,80 C-100,80 -120,40 -120,0Z"/>
    <!-- D-pad -->
    <line x1="-65" y1="-20" x2="-65" y2="20"/>
    <line x1="-85" y1="0" x2="-45" y2="0"/>
    <!-- Buttons -->
    <circle cx="55" cy="-20" r="8" fill="#00f0ff"/>
    <circle cx="75" cy="0" r="8" fill="#6c5ce7"/>
  </g>
  <text x="256" y="370" text-anchor="middle" font-family="sans-serif" font-size="48" font-weight="800" fill="#00f0ff">GAME</text>
</svg>
